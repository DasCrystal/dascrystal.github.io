<template #counter- $count=0
    style="
        display: block;
        color: black;
        font-size: 50px;
        * {
            color: black;
            font-size: 50px;
        }
    "
>
    <div>
        Click this! ->  <button onclick="this.$.count += 1;">{count}</button>
    </div>
</template>
